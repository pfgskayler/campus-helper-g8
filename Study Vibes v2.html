<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: #FFF9EC;
    color: #5D2A42;
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #EEE0D4; border-radius: 3px; }
  button, input, textarea, select { font-family: 'Montserrat', sans-serif; }

  /* ── HOVER SYSTEM ────────────────────────────── */

  /* Nav links */
  .sv-navlink { transition: color 0.18s, background 0.18s !important; }
  .sv-navlink:hover { color: #FB6376 !important; background: rgba(251,99,118,0.08) !important; }

  /* Primary buttons */
  .sv-btn-primary { transition: background 0.18s, box-shadow 0.18s, transform 0.18s !important; }
  .sv-btn-primary:hover { background: #E84D62 !important; box-shadow: 0 6px 22px rgba(251,99,118,0.45) !important; transform: translateY(-1px) !important; }
  .sv-btn-primary:active { transform: translateY(0) !important; }

  /* Ghost / secondary buttons */
  .sv-btn-ghost { transition: background 0.18s, border-color 0.18s, color 0.18s !important; }
  .sv-btn-ghost:hover { background: #FDE8EC !important; border-color: #FB6376 !important; color: #FB6376 !important; }

  /* Purple buttons */
  .sv-btn-purple { transition: background 0.18s, box-shadow 0.18s, transform 0.18s !important; }
  .sv-btn-purple:hover { background: #4A1F32 !important; box-shadow: 0 6px 20px rgba(93,42,66,0.35) !important; transform: translateY(-1px) !important; }

  /* Category pills */
  .sv-pill { transition: all 0.18s !important; }
  .sv-pill:not(.sv-pill-active):hover { background: #FDE8EC !important; color: #FB6376 !important; border-color: rgba(251,99,118,0.4) !important; }

  /* Event card image zoom */
  .sv-card-img-wrap { overflow: hidden; }
  .sv-card-img-wrap img { transition: transform 0.32s ease !important; }
  .sv-card:hover .sv-card-img-wrap img { transform: scale(1.06) !important; }

  /* Search bar */
  .sv-search { transition: box-shadow 0.2s, border-color 0.2s !important; }
  .sv-search:hover { box-shadow: 0 0 0 2px rgba(251,99,118,0.18), 0 8px 28px rgba(0,0,0,0.14) !important; }
  .sv-search:focus-within { box-shadow: 0 0 0 3px rgba(251,99,118,0.32), 0 8px 32px rgba(0,0,0,0.18) !important; }

  /* Conversation rows */
  .sv-convo-row { transition: background 0.15s !important; }
  .sv-convo-row:hover { background: #FEF5E7 !important; }

  /* Auth toggle buttons */
  .sv-auth-tab { transition: all 0.18s !important; }

  /* Settings / list rows */
  .sv-list-row { transition: background 0.15s !important; }
  .sv-list-row:hover { background: #FEF5E7 !important; }

  /* Past event cards on profile */
  .sv-past-card { transition: opacity 0.18s, box-shadow 0.18s !important; }
  .sv-past-card:hover { opacity: 1 !important; box-shadow: 0 4px 16px rgba(93,42,66,0.12) !important; }

// ── NAVBAR ─────────────────────────────────────────────────
const NAV_LINKS = [
  { id:"home",     label:"Accueil"   },
  { id:"messages", label:"Messages"  },
  { id:"profile",  label:"Profil"    },
];

function Navbar({ screen, navigate, unread }) {
  return (
    <nav style={{
      position:"fixed", top:0, left:0, right:0, height:64, zIndex:1000,
      background:"rgba(255,249,236,0.95)", backdropFilter:"blur(12px)",
      borderBottom:`1px solid #EEE0D4`,
      display:"flex", alignItems:"center",
      padding:"0 32px", gap:0
    }}>
      {/* Logo */}
      <button onClick={()=>navigate("home")} style={{
        background:"none", border:"none", cursor:"pointer",
        display:"flex", alignItems:"center", padding:0, marginRight:48
      }}>
        <Logo height={44} />
      </button>

      {/* Nav links */}
      <div style={{ display:"flex", gap:4, flex:1 }}>
        {NAV_LINKS.map(l => {
          const active = screen === l.id;
          return (
            <button key={l.id} onClick={()=>navigate(l.id)} className="sv-navlink" style={{
              padding:"8px 18px", borderRadius:50, fontWeight:600, fontSize:14,
              fontFamily:"'Montserrat', sans-serif",
              background: active ? "#FDE8EC" : "none",
              color: active ? "#FB6376" : "#9E7A8A",
              border:"none", cursor:"pointer",
              position:"relative"
            }}>
              {l.label}
              {l.id==="messages" && unread>0 && (
                <span style={{
                  position:"absolute", top:4, right:6,
                  background:"#FB6376", borderRadius:50, width:16, height:16,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  fontSize:9, color:"#fff", fontWeight:700
                }}>{unread}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* Right actions */}
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <button onClick={()=>navigate("create")} className="sv-btn-primary" style={{
          background:"#FB6376", color:"#fff", border:"none", borderRadius:12,
          padding:"9px 20px", fontFamily:"'Montserrat', sans-serif",
          fontWeight:700, fontSize:14, cursor:"pointer",
          boxShadow:"0 3px 12px rgba(251,99,118,0.3)"
        }}>+ Créer</button>
        <button onClick={()=>navigate("profile")} style={{
          width:38, height:38, borderRadius:38, background:"#FB6376",
          border:"none", cursor:"pointer", color:"#fff",
          fontWeight:700, fontSize:15, fontFamily:"'Montserrat', sans-serif"
        }}>M</button>
        <button onClick={()=>navigate("auth")} style={{
          background:"none", border:`1.5px solid #EEE0D4`, borderRadius:10,
          padding:"7px 14px", fontSize:13, fontWeight:600, color:"#9E7A8A",
          cursor:"pointer", fontFamily:"'Montserrat', sans-serif"
        }}>Connexion</button>
      </div>
    </nav>
  );
}

// ── APP ────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [history, setHistory] = useState(["home"]);
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [events, setEvents] = useState(EVENTS_DATA);
  const [tweaks, setTweakState] = useState(TWEAK_DEFAULTS);

  const navigate = (to, data) => {
    if (to === -1) {
      const prev = history.slice(0,-1);
      const last = prev[prev.length-1] || "home";
      setHistory(prev.length ? prev : ["home"]);
      setScreen(last);
      window.scrollTo({top:0});
      return;
    }
    if (to === "detail" && data) setSelectedEvent(data);
    setHistory(h => [...h, to]);
    setScreen(to);
    window.scrollTo({top:0});
  };

  const toggleJoin = (id) => {
    setEvents(evs => evs.map(e => e.id===id ? {...e, joined:!e.joined} : e));
    if (selectedEvent?.id===id) setSelectedEvent(ev => ({...ev, joined:!ev.joined}));
  };

  const toggleLike = (id) => {
    setEvents(evs => evs.map(e => e.id===id ? {...e, liked:!e.liked} : e));
    if (selectedEvent?.id===id) setSelectedEvent(ev => ({...ev, liked:!ev.liked}));
  };

  const setTweak = (k, v) => {
    const next = typeof k==="object" ? {...tweaks,...k} : {...tweaks,[k]:v};
    setTweakState(next);
    window.parent.postMessage({type:"__edit_mode_set_keys", edits:next}, "*");
  };

  const unread = CONVOS_DATA.reduce((n,c) => n+c.unread, 0);
  const showNav = screen !== "auth";

  return (
    <div style={{ minHeight:"100vh", background:"#FFF9EC" }}>
      {showNav && <Navbar screen={screen} navigate={navigate} unread={unread} />}

      <main style={{
        maxWidth: screen==="messages" ? 1200 : 1100,
        margin:"0 auto",
        padding: screen==="auth" ? "0"
          : screen==="messages" ? "80px 32px 0"
          : "96px 32px 0",
      }}>
        {screen==="home"     && <HomeView events={events} navigate={navigate} onLike={toggleLike} />}
        {screen==="messages" && <MessagesView navigate={navigate} />}
        {screen==="profile"  && <ProfileView events={events} navigate={navigate} onLike={toggleLike} />}
        {screen==="detail"   && selectedEvent && (
          <EventDetailView ev={selectedEvent} navigate={navigate} onJoin={toggleJoin} onLike={toggleLike} />
        )}
        {screen==="auth"     && <AuthView navigate={navigate} />}
        {screen==="create"   && <CreateEventView navigate={navigate} />}
      </main>

      <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
        <TweakSection title="Couleurs">
          <TweakColor label="Accent (corail)" id="coral" tweaks={tweaks} setTweak={setTweak} />
          <TweakColor label="Texte (violet)" id="purple" tweaks={tweaks} setTweak={setTweak} />
          <TweakColor label="Fond" id="bg" tweaks={tweaks} setTweak={setTweak} />
        </TweakSection>
        <TweakSection title="Navigation rapide">
          <TweakRadio label="Écran" id="demoScreen"
            options={[{label:"Accueil",value:"home"},{label:"Messages",value:"messages"},{label:"Profil",value:"profile"}]}
            tweaks={tweaks} setTweak={(k,v)=>{ setTweak(k,v); setScreen(v); }} />
        </TweakSection>
        <TweakSection title="Pages spéciales">
          <TweakButton label="Auth / Connexion" onClick={()=>setScreen("auth")} />
          <TweakButton label="Créer un événement" onClick={()=>setScreen("create")} />
          <TweakButton label="Détail événement" onClick={()=>{ setSelectedEvent(events[0]); setScreen("detail"); }} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "coral": "#FB6376",
  "purple": "#5D2A42",
  "bg": "#FFF9EC",
  "demoScreen": "home"
}/*EDITMODE-END*/;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
